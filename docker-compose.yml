services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
      POSTGRES_DB: clinic_saas
    ports:
      - "5432:5432"
    volumes:
      - clinic_saas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d clinic_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clinic_saas_postgres_data:
